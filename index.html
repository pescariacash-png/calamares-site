<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calamares</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #111; /* Fundo escuro */
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      padding: 20px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 3px;
      margin-bottom: 30px;
      color: #ffffff;
    }

    .whatsapp-button {
      display: inline-block;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 18px 40px;
      font-size: 1.3rem;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .whatsapp-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .address {
      margin-top: 20px;
      font-size: 1rem;
      font-weight: 200;
      color: #aaaaaa;
      line-height: 1.5;
    }

    .promo {
      font-size: 1.2rem;
      font-weight: 400;
      color: #ffffff; /* Frases em branco */
      margin-bottom: 15px;
      opacity: 0;
      animation: fadeIn 3s forwards;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.5rem;
      }
      .whatsapp-button {
        padding: 15px 30px;
        font-size: 1.1rem;
      }
      .address {
        font-size: 0.9rem;
      }
      .promo {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <h1>Calamares</h1>

  <div class="promo">Looks incríveis para toda a família!</div>
  <div class="promo" style="animation-delay: 1s;">Promoções exclusivas hoje!</div>
  <div class="promo" style="animation-delay: 2s;">Compre agora pelo WhatsApp!</div>
  <div class="promo" style="animation-delay: 3s;">Elevando toda a região!</div>

  <!-- Link direto para WhatsApp -->
  <a href="https://wa.me/556898965550" target="_blank" class="whatsapp-button">
    WhatsApp
  </a>

  <div class="address">
    Avenida Marechal Teodoro, Centro, Nº 1117
  </div>
</body>
</html>
